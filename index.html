<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫實業股份有限公司 - 勞安日誌系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 列印樣式設定 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .container { border: none; max-width: 100%; margin: 0; box-shadow: none; }
            .page-break { page-break-before: always; }
        }

        /* 基礎表格樣式 */
        table td, table th {
            border: 1px solid #000;
            padding: 8px;
        }
        .bg-custom-header { background-color: #f8f9fa; }
        .bg-custom-peach { background-color: #ffe5d9; }
        .bg-custom-tan { background-color: #fdf0d5; }
        
        input[type="text"], textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
        }
        textarea { resize: none; }

        /* 勾選框佈局 */
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 6px;
            padding: 8px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 2px;
        }
        .checkbox-item input { 
            width: 16px; 
            height: 16px; 
            margin-right: 6px; 
            cursor: pointer;
        }
        
        /* 相片預覽樣式 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 640px) {
            .photo-grid { grid-template-columns: 1fr; }
        }
        .photo-card {
            border: 1px solid #ddd;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            border-radius: 6px;
        }
        .photo-preview {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            border: 1px solid #eee;
            border-radius: 4px;
            background-color: #f9fafb;
        }
        .section-title {
            background-color: #e5e7eb;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 4px 10px;
        }

        /* 載入動畫 */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 歷史紀錄表格 */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .history-table th {
            background-color: #1e40af;
            color: white;
            position: sticky;
            top: 0;
        }
        .history-table tr:nth-child(even) { background-color: #f3f4f6; }
        .history-container {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #ccc;
        }
    </style>
</head>

    <script>
        // *** GAS Web App 網址 ***
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxwI62lUpE5nHqEy9GO_X69d6YH_9vXtheBqXl52dFpYvp7qSuHycrrrhokBm-kom3p/exec";

        let uploadedPhotos = []; 

        function switchPage(pageId) {
            // 切換隱藏/顯示
            document.querySelectorAll('.content-page').forEach(page => page.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');

            // 切換按鈕樣式
            document.querySelectorAll('.page-btn').forEach(btn => {
                btn.className = "page-btn px-4 py-2 rounded-full font-bold bg-blue-800 text-white hover:bg-blue-900 transition";
            });
            const activeBtn = document.getElementById(`btn-${pageId}`);
            activeBtn.className = "page-btn px-4 py-2 rounded-full font-bold bg-white text-blue-700 transition shadow";

            // 如果切換到歷史紀錄，自動抓取
            if (pageId === 'page3') {
                fetchHistory();
            }
        }

        async function fetchHistory() {
            const body = document.getElementById('historyBody');
            const loader = document.getElementById('historyLoader');
            
            body.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                // 發送 GET 請求 (GAS 需實作 doGet)
                const response = await fetch(GAS_URL);
                const data = await response.json();

                if (data.status === "success") {
                    const records = data.data;
                    if (records.length === 0) {
                        body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-400">尚無紀錄</td></tr>';
                    } else {
                        // 倒序顯示（最新的在上面），假設第一列是標題所以從 index 1 開始
                        records.slice(1).reverse().forEach(row => {
                            const tr = document.createElement('tr');
                            // 欄位索引根據你的試算表結構調整
                            tr.innerHTML = `
                                <td class="p-3 text-center border-r">${row[0] || ''}</td>
                                <td class="p-3 border-r">${row[1] || ''}</td>
                                <td class="p-3 text-center border-r">${row[3] || ''}</td>
                                <td class="p-3 border-r">${row[6] || ''}</td>
                                <td class="p-3 text-center">
                                    ${row[12] ? `<a href="${row[12]}" target="_blank" class="text-blue-600 underline font-bold">查看照片</a>` : '無'}
                                </td>
                            `;
                            body.appendChild(tr);
                        });
                    }
                }
            } catch (error) {
                body.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">無法讀取資料：${error.message}</td></tr>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function handleImageUpload(event) {
            const files = event.target.files;
            const container = document.getElementById('photoContainer');
            if (container.querySelector('.italic')) container.innerHTML = '';

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    const photoId = Date.now() + Math.random();
                    
                    uploadedPhotos.push({ id: photoId, base64: base64Data, type: file.type });

                    const card = document.createElement('div');
                    card.className = 'photo-card relative shadow-md';
                    card.dataset.id = photoId;
                    card.innerHTML = `
                        <button onclick="removePhoto(${photoId})" class="no-print absolute -top-3 -right-3 bg-red-600 text-white w-8 h-8 rounded-full border-2 border-white font-bold shadow">✕</button>
                        <img src="${base64Data}" class="photo-preview">
                        <textarea placeholder="相片描述..." class="text-sm border-b border-gray-300 p-2" rows="2"></textarea>
                    `;
                    container.appendChild(card);
                };
                reader.readAsDataURL(file);
            });
        }

        function removePhoto(id) {
            uploadedPhotos = uploadedPhotos.filter(p => p.id !== id);
            const el = document.querySelector(`[data-id="${id}"]`);
            if (el) el.remove();
            if (uploadedPhotos.length === 0) {
                document.getElementById('photoContainer').innerHTML = '<div class="no-print text-gray-400 italic text-center col-span-2 py-20">目前尚無照片。</div>';
            }
        }

        async function saveDataToGoogle() {
            const btn = document.getElementById('saveBtn');
            const loader = document.getElementById('saveLoader');
            const text = document.getElementById('saveText');

            const getCheckedValues = (groupId) => {
                return Array.from(document.querySelectorAll(`${groupId} input:checked`)).map(i => i.value);
            };

            const payload = {
                currentDate: document.getElementById('currentDate').value,
                taskName: document.getElementById('taskName').value,
                inspectItem: document.getElementById('inspectItem').value,
                location: document.getElementById('location').value,
                safetyStatus: document.getElementById('safetyStatus').value,
                healthStatus: document.getElementById('healthStatus').value,
                suggestions: document.getElementById('suggestions').value,
                safetyHazards: getCheckedValues('#group-safety'),
                healthHazards: getCheckedValues('#group-health'),
                dailyInspections: getCheckedValues('#group-daily'),
                inspectMethod: getCheckedValues('#group-method'),
                recordMethod: getCheckedValues('#group-record'),
                photos: uploadedPhotos 
            };

            btn.disabled = true;
            loader.classList.remove('hidden');
            text.innerText = "儲存中...";

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (result.result === "success") {
                    alert("✅ 儲存成功！");
                    // 儲存後如果是切換到歷史頁面會看到新的
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                alert("❌ 儲存失敗：" + error.message);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                text.innerText = "儲存至雲端";
            }
        }

        window.onload = function() {
            const d = new Date();
            const year = d.getFullYear() - 1911;
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            document.getElementById('currentDate').value = `${year} 年 ${month} 月 ${day} 日`;

            window.onbeforeprint = () => {
                document.querySelectorAll('.content-page').forEach(p => p.classList.remove('hidden'));
                document.getElementById('page3').classList.add('hidden'); // 列印不印歷史紀錄
            };
            window.onafterprint = () => {
                // 恢復原本顯示的頁面
                const activeId = document.querySelector('.page-btn.bg-white').id.replace('btn-', '');
                switchPage(activeId);
            };
        }
    </script>
</body>
</html>
